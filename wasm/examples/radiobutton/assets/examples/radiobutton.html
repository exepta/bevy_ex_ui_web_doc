<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="radio-example">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="base.css">
</head>
<body>
<div class="display-center">
  <h3 id="radio-value">Selected: Green</h3>
</div>
<fieldset id="set-radio" allow-none="false" onchange="radio_change">
  <radio value="red">Red</radio>
  <radio selected value="green">Green</radio>
  <radio value="blue">Blue</radio>
</fieldset>
</body>
</html>
