<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="fieldset-example">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="base.css">
</head>
<body>
<div class="display-center">
  <h3 id="fieldset-value">Selection: Option A</h3>
</div>
<fieldset id="set-field" allow-none="false" mode="single" onchange="fieldset_change">
  <radio selected value="option_a">Option A</radio>
  <radio value="option_b">Option B</radio>
  <radio value="option_c">Option C</radio>
</fieldset>
</body>
</html>
