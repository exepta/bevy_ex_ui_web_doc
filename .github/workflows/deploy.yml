name: Deploy

on:
  push:
    branches:
      - beta
      - release

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: 85.215.116.15
      DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_SSH_USER }}
      REMOTE_DIR: /opt/bevy-ex-ui-web-doc
      DOCS_BASE_PATH: /libraries/docs/bevy_extended_ui/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test:run

      - name: Resolve deploy target
        id: target
        run: |
          set -euo pipefail

          case "${GITHUB_REF_NAME}" in
            beta)
              echo "deploy_env=beta" >> "$GITHUB_OUTPUT"
              echo "domain=dev.tilt-us.com" >> "$GITHUB_OUTPUT"
              echo "target_container=bevy-docs-beta" >> "$GITHUB_OUTPUT"
              ;;
            release)
              echo "deploy_env=release" >> "$GITHUB_OUTPUT"
              echo "domain=tilt-us.com" >> "$GITHUB_OUTPUT"
              echo "target_container=bevy-docs-release" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          echo "image_ref=bevy-docs:${GITHUB_REF_NAME}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "archive_name=bevy-docs-${GITHUB_REF_NAME}-${GITHUB_SHA}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build docker image
        env:
          IMAGE_REF: ${{ steps.target.outputs.image_ref }}
        run: docker build --build-arg DOCS_BASE_PATH="${DOCS_BASE_PATH}" --tag "${IMAGE_REF}" .

      - name: Save docker image archive
        env:
          IMAGE_REF: ${{ steps.target.outputs.image_ref }}
          ARCHIVE_NAME: ${{ steps.target.outputs.archive_name }}
        run: docker save "${IMAGE_REF}" | gzip > "${ARCHIVE_NAME}"

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${REMOTE_DIR}/nginx'"

      - name: Upload compose and nginx config
        run: |
          scp -P "${DEPLOY_PORT}" deploy/server/docker-compose.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_DIR}/docker-compose.yml"
          scp -P "${DEPLOY_PORT}" deploy/server/nginx/edge.conf "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_DIR}/nginx/edge.conf"

      - name: Upload docker image archive
        env:
          ARCHIVE_NAME: ${{ steps.target.outputs.archive_name }}
        run: scp -P "${DEPLOY_PORT}" "${ARCHIVE_NAME}" "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/${ARCHIVE_NAME}"

      - name: Deploy on server
        env:
          IMAGE_REF: ${{ steps.target.outputs.image_ref }}
          ARCHIVE_NAME: ${{ steps.target.outputs.archive_name }}
          DEPLOY_ENV: ${{ steps.target.outputs.deploy_env }}
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; \
            gunzip -c '/tmp/${ARCHIVE_NAME}' | docker load; \
            docker tag '${IMAGE_REF}' 'bevy-docs:${DEPLOY_ENV}-current'; \
            if ! docker image inspect 'bevy-docs:beta-current' >/dev/null 2>&1; then docker tag '${IMAGE_REF}' 'bevy-docs:beta-current'; fi; \
            if ! docker image inspect 'bevy-docs:release-current' >/dev/null 2>&1; then docker tag '${IMAGE_REF}' 'bevy-docs:release-current'; fi; \
            cd '${REMOTE_DIR}'; \
            docker compose up -d --remove-orphans bevy-docs-beta bevy-docs-release reverse-proxy; \
            rm -f '/tmp/${ARCHIVE_NAME}'"

      - name: Smoke test on server
        env:
          DOMAIN: ${{ steps.target.outputs.domain }}
          TARGET_CONTAINER: ${{ steps.target.outputs.target_container }}
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; \
            if ! docker exec bevy-docs-edge wget -qO- 'http://${TARGET_CONTAINER}/' >/dev/null; then \
              docker ps; \
              docker logs --tail=200 bevy-docs-edge || true; \
              docker logs --tail=200 ${TARGET_CONTAINER} || true; \
              exit 1; \
            fi; \
            if ! docker exec bevy-docs-edge wget -qO- --header='Host: ${DOMAIN}' 'http://127.0.0.1/libraries/docs/bevy_extended_ui/' >/dev/null; then \
              docker ps; \
              docker logs --tail=200 bevy-docs-edge || true; \
              docker logs --tail=200 ${TARGET_CONTAINER} || true; \
              exit 1; \
            fi"

      - name: Cleanup local archive
        if: always()
        env:
          ARCHIVE_NAME: ${{ steps.target.outputs.archive_name }}
        run: rm -f "${ARCHIVE_NAME}"
