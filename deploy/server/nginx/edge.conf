map $host $docs_upstream {
  default "";
  dev.tilt-us.com http://bevy-docs-beta:80;
  tilt-us.com http://bevy-docs-release:80;
}

server {
  listen 80;
  server_name dev.tilt-us.com tilt-us.com;

  location = /libraries/docs/bevy_extended_ui {
    return 301 /libraries/docs/bevy_extended_ui/;
  }

  location /libraries/docs/bevy_extended_ui/ {
    if ($docs_upstream = "") {
      return 404;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass $docs_upstream/;
  }

  location / {
    return 404;
  }
}
