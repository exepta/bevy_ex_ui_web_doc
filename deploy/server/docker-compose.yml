name: bevy-ex-ui-docs

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: bevy-docs-edge
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bevy-docs-beta
      - bevy-docs-release
    networks:
      - docs-net

  bevy-docs-beta:
    image: ${BETA_IMAGE:-bevy-docs:beta-current}
    container_name: bevy-docs-beta
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - docs-net

  bevy-docs-release:
    image: ${RELEASE_IMAGE:-bevy-docs:release-current}
    container_name: bevy-docs-release
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - docs-net

networks:
  docs-net:
    name: bevy-docs-net
